name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project horoscope.xcodeproj

      - name: Secret scan
        run: |
          if grep -R -n -E --exclude-dir=.git --exclude-dir=DerivedData --exclude=ios-ci.yml --exclude=Secrets.template.xcconfig --exclude=Secrets.xcconfig --exclude=README.md \
            'sk-or-[A-Za-z0-9._-]{20,}|Authorization:[[:space:]]*Bearer[[:space:]]+sk-or-[A-Za-z0-9._-]{20,}|OPENROUTER_API_KEY[[:space:]]*=[[:space:]]*sk-or-[A-Za-z0-9._-]{20,}|FREE_ASTRO_API_KEY[[:space:]]*=[[:space:]]*[A-Za-z0-9._-]{12,}' .; then
            echo "Potential hardcoded secret found."
            exit 1
          fi

      - name: Select simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "Using simulator: $SIMULATOR_NAME"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> "$GITHUB_ENV"

      - name: Build
        run: |
          xcodebuild \
            -project horoscope.xcodeproj \
            -scheme horoscope \
            -destination "platform=iOS Simulator,name=${SIMULATOR_NAME}" \
            build

      - name: Unit tests
        run: |
          xcodebuild \
            -project horoscope.xcodeproj \
            -scheme horoscope \
            -destination "platform=iOS Simulator,name=${SIMULATOR_NAME}" \
            -only-testing:horoscopeTests \
            test

      - name: UI smoke tests
        run: |
          xcodebuild \
            -project horoscope.xcodeproj \
            -scheme horoscope \
            -destination "platform=iOS Simulator,name=${SIMULATOR_NAME}" \
            -only-testing:horoscopeUITests/testQuickActionsButtonNavigatesToChat \
            -only-testing:horoscopeUITests/testChatComposerKeyboardAdaptiveChrome \
            test
